name: release-on-tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Enforce nested installs (no root node_modules)
        run: echo "install-strategy=nested" >> .npmrc

      - name: Install deps (workspaces)
        run: npm ci -ws

      - name: Build frontend
        run: npm run build -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Prune backend to production deps
        run: npm prune --omit=dev -w backend

      - name: Prepare release directory (only runtime files)
        run: |
          rm -rf release && mkdir -p release/backend release/frontend
          # backend: dist + prod node_modules + package.json
          cp backend/package.json release/backend/
          cp -r backend/dist release/backend/dist
          cp -r backend/node_modules release/backend/node_modules
          # frontend: только собранная статика
          cp -r frontend/dist release/frontend/dist

      - name: Create archives (tar.gz and zip)
        run: |
          tar -czf kpi-${{ github.ref_name }}.tar.gz -C release .
          (cd release && zip -r ../kpi-${{ github.ref_name }}.zip .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            kpi-${{ github.ref_name }}.tar.gz
            kpi-${{ github.ref_name }}.zip
