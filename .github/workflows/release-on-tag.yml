name: release-on-tag

on:
  push:
    tags: ['v*']

permissions:
  contents: write      # для релиза
  packages: write      # для push в ghcr

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Enforce nested installs (no root node_modules)
        run: echo "install-strategy=nested" >> .npmrc

      - name: Install deps (workspaces)
        run: npm ci -ws

      - name: Build frontend
        run: npm run build -w frontend

      - name: Build backend
        run: npm run build -w backend

      # Собираем чистый релиз-лейаут: package.json (бэка), dist/ (бэк), public/ (фронт)
      - name: Assemble release layout (no node_modules)
        run: |
          rm -rf release && mkdir -p release/{public,dist}
          cp backend/package.json release/package.json
          cp -r backend/dist/* release/dist/
          cp -r frontend/dist/* release/public/
          find release -name "*.map" -delete

      # --- Создание GitHub Release с архивами (опционально, можно оставить как у тебя)
      - name: Pack artifacts
        run: |
          tar -czf kpi-${{ github.ref_name }}.tar.gz -C release .
          (cd release && zip -r ../kpi-${{ github.ref_name }}.zip .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            kpi-${{ github.ref_name }}.tar.gz
            kpi-${{ github.ref_name }}.zip

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create runtime Dockerfile
        run: |
          cat > release/Dockerfile <<'DOCKER'
          FROM node:20-alpine
          ENV NODE_ENV=production
          WORKDIR /app
          COPY package.json ./package.json
          COPY dist ./dist
          COPY public ./public
          # если есть runtime-зависимости, поставятся; если нет — просто пройдёт
          RUN --mount=type=cache,target=/root/.npm npm ci --omit=dev || true
          EXPOSE 3000
          CMD ["node","dist/server.js"]
          DOCKER

      - name: Build & push image to GHCR
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/kpi
          TAG: ${{ github.ref_name }}
        run: |
          docker build -t $IMAGE:$TAG -t $IMAGE:latest -f release/Dockerfile release
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Deploy to CapRover (by image)
        run: |
          npx caprover@2.x deploy \
            -h "${{ secrets.CAPROVER_URL }}" \
            -a "${{ secrets.CAPROVER_APP }}" \
            -i "ghcr.io/${{ github.repository_owner }}/kpi:${{ github.ref_name }}" \
            -t "${{ secrets.CAPROVER_TOKEN }}"
