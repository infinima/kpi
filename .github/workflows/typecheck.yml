name: typecheck

on:
  push:
    branches: ['**']
  pull_request:
      branches: [ '**' ]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Enforce nested installs
        run: echo "install-strategy=nested" >> .npmrc

      - name: Install deps (workspaces)
        run: npm ci -ws

      - name: Run typecheck
        run: npm run typecheck
